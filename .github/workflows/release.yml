name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to release"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish win-x64 release
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: ga

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }

          if ($tag -match '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$') {
            $version = $Matches['version']
          } else {
            throw "Release tag '$tag' must use a version such as v1.2.3 or v1.2.3-beta.1."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "archive=CharsetFlow-$version-win-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore CharsetFlow.csproj --runtime win-x64

      - name: Publish application
        shell: pwsh
        run: |
          dotnet publish CharsetFlow.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output "$env:RUNNER_TEMP\publish" `
            -p:Version="${{ steps.release.outputs.version }}"

      - name: Package application
        id: package
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "${{ steps.release.outputs.archive }}"
          $checksum = "$archive.sha256"

          Compress-Archive `
            -Path "$env:RUNNER_TEMP\publish\*" `
            -DestinationPath $archive `
            -CompressionLevel Optimal `
            -Force

          $hash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([IO.Path]::GetFileName($archive))" |
            Set-Content -Path $checksum -Encoding ascii

          "archive=$archive" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $arguments = @(
            "release", "create",
            "${{ steps.release.outputs.tag }}",
            "${{ steps.package.outputs.archive }}",
            "${{ steps.package.outputs.checksum }}",
            "--verify-tag",
            "--generate-notes",
            "--title", "CharsetFlow ${{ steps.release.outputs.tag }}"
          )

          if ("${{ steps.release.outputs.version }}" -match '-') {
            $arguments += "--prerelease"
          }

          gh @arguments
